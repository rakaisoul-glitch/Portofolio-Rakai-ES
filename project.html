    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #000;
            color: #e4e4e7;
            margin: 0;
        }

        header {
            background: #050505;
            text-align: center;
            padding: 30px;
            border-bottom: 1px solid #ff0033;
            box-shadow: 0 0 15px #ff003355;
        }

        header h1 {
            margin: 0;
            font-family: 'Orbitron', sans-serif;
            color: #ff4d6d;
            text-shadow: 0 0 10px #ff0033;
            letter-spacing: 2px;
        }

        nav {
            background-color: #020202;
            padding: 12px;
            text-align: center;
            border-bottom: 1px solid #111;
        }

        nav a {
            color: #aaa;
            margin: 0 15px;
            text-decoration: none;
        }

        nav a:hover {
            color: #ff4d6d;
            text-shadow: 0 0 6px #ff0033;
        }

        .container {
            width: 90%;
            margin: 25px auto;
            padding: 20px;
        }

        .container h2 {
            text-align: center;
            color: #ff4d6d;
        }

        .container p {
            text-align: center;
            color: #aaa;
        }

        /* GRID FIX 2 KOLOM */
        .project-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
            margin-top: 30px;
        }

        .project-card {
            background: #050505;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #111;
            transition: 0.3s;
        }

        .project-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 0 20px #ff003355;
        }

        .project-card img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            filter: brightness(0.85);
        }

        .project-card a {
            display: block;
            padding: 15px;
            text-decoration: none;
            color: #ff4d6d;
            font-weight: 500;
            transition: 0.3s;
            text-align: center;
        }

        .project-card a:hover {
            background: #ff0033;
            color: white;
        }

        footer {
            background-color: #020202;
            text-align: center;
            padding: 15px;
            margin-top: 20px;
            color: #777;
            border-top: 1px solid #111;
        }

        @media (max-width: 768px) {
            .project-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
